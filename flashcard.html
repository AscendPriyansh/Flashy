<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <div class="main">
        <div class="navbar">
            <h2 class="heading">FLASHY</h2>
            <div class="links">
                <a class="link" href="/index.html">Home</a>
                <a class="link" href="https://x.com/AscendEleven" target="_blank">Contact</a>
            </div>
        </div>

        <div class="hero">
            <div class="container">
                <div class="arrow arrow-left"><i class="fa-solid fa-angle-left"></i></div>
                <div class="arrow upper arrow-right1"><i class="fa-solid fa-angle-right"></i></div>
                <div class="cards">
                    <div class="card shadow"></div>
                    <div class="card shadow"></div>

                    <div class="flashcard">
                        <h2 class="heading">test</h2>
                    </div>
                </div>

                <div class="arrow lower arrow-right2"><i class="fa-solid fa-angle-right"></i></div>
            </div>
            <button class="showanswer">Show Answer</button>
        </div>

        <div class="footer">
            <div class="topic">topic</div>
            <div class="count">count</div>
        </div>
    </div>

    <script src="js/script.js"></script>
